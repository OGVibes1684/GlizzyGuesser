<!doctype html>
<html lang="en">

<head>
  <style>
    body {
      background-image: url("../Images/HotDogBackground.gif");
      background-attachment: fixed;
      background-size: cover;
    }
  </style>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <main>
    <label for="input-file" id="drop-area">
      <input type="file" accept="image/png, image/jpeg, image/jpg, image/gif, image/webp" id="input-file" hidden />

      <!-- Preview area -->
      <div id="img-view">
        <div id="placeholder">
          <span class="icon">📂</span>
          <p>Drag & drop or <strong>click to upload</strong></p>
          <span class="hint">PNG, JPG, GIF, WEBP supported</span>
        </div>
      </div>
    </label>

    <!-- Result banner -->
    <div id="result" class="hidden"></div>

    <!-- Incorrect submission counter -->
    <p id="counter-msg"></p>
  </main>

  <script src="main.js"></script>
</body>

</html>
